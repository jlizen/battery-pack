  warnings:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: {{ pin_github_action("actions/checkout", "v6") }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: {{ pin_github_action("Swatinem/rust-cache", "v2") }}
      - run: cargo check --all-targets --all-features
