[placeholders.ci_platform]
type = "select"
prompt = "CI platform"
options = ["github", "none"]
default = "github"

[placeholders.repo_owner]
type = "string"
prompt = "Repository owner (org or user)"
default = "OWNER"

[[hints]]
message = "Works automatically on public repos. For private repos, enable Code Scanning at Settings → Security → Code security"