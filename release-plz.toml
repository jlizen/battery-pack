# All crates get published to crates.io when their version changes.
# battery-pack and battery-pack-cli get GitHub releases; all other crates
# roll their commits into the battery-pack changelog so there's one
# unified release post for library changes.
[workspace]
git_release_enable = false

[[package]]
name = "battery-pack"
git_release_enable = true
# Roll commits from every other crate into the battery-pack changelog,
# so the GitHub release notes cover the whole workspace.
changelog_include = [
    "bphelper-build",
    "bphelper-cli",
    "bphelper-manifest",
    "cli-battery-pack",
    "error-battery-pack",
    "logging-battery-pack",
]

[[package]]
name = "battery-pack-cli"
git_release_enable = true
changelog_include = ["bphelper-cli"]
